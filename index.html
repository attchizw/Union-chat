<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Union's Chat</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial; background: #0d0d1a; color: #fff;
           display: flex; justify-content: center; align-items: center; height: 100vh; }
    .container { width: 420px; background: #16213e; border-radius: 16px;
                 padding: 20px; box-shadow: 0 0 40px rgba(233,69,96,0.3); }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .logo { font-size: 22px; font-weight: bold; color: #e94560; }
    .user-info { font-size: 13px; color: #aaa; }
    .user-info span { color: #e94560; font-weight: bold; }
    #logout { background: none; border: 1px solid #e94560; color: #e94560;
              padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }
    #chat-box { height: 380px; overflow-y: auto; background: #0f3460;
                border-radius: 10px; padding: 12px; margin-bottom: 12px; }
    .msg { margin: 8px 0; padding: 8px 14px; border-radius: 18px;
           max-width: 80%; word-break: break-word; font-size: 14px; }
    .msg.me { background: #e94560; margin-left: auto; text-align: right; }
    .msg.stranger { background: #533483; }
    .msg.system { background: transparent; color: #aaa;
                  text-align: center; font-size: 12px; max-width: 100%; }
    .msg .sender { font-size: 11px; opacity: 0.7; margin-bottom: 3px; }
    #input-area { display: flex; gap: 8px; margin-bottom: 10px; }
    #msg-input { flex: 1; padding: 11px; border: none; border-radius: 8px;
                 background: #0f3460; color: #fff; font-size: 14px; }
    #msg-input:focus { outline: none; }
    #send-btn { padding: 11px 18px; background: #e94560; color: #fff;
                border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
    #start-btn { width: 100%; padding: 13px; background: #533483;
                 color: #fff; border-radius: 8px; font-size: 15px;
                 border: none; cursor: pointer; }
    #start-btn:hover { background: #e94560; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">Union's</div>
    <div class="user-info">Hello, <span id="username-display"></span></div>
    <button id="logout">Logout</button>
  </div>
  <div id="chat-box"></div>
  <div id="input-area">
    <input id="msg-input" type="text" placeholder="Type a message..." disabled />
    <button id="send-btn" disabled>Send</button>
  </div>
  <button id="start-btn">🔍 Find a Stranger</button>
</div>
<script>
  // التحقق من تسجيل الدخول
  const token = localStorage.getItem('token');
  const username = localStorage.getItem('username');
  if (!token) window.location.href = 'login.html';

  document.getElementById('username-display').textContent = username;
  document.getElementById('logout').onclick = () => {
    localStorage.clear();
    window.location.href = 'login.html';
  };

  const socket = io();
  const chatBox = document.getElementById('chat-box');
  const msgInput = document.getElementById('msg-input');
  const sendBtn = document.getElementById('send-btn');
  const startBtn = document.getElementById('start-btn');

  function addMessage(text, type, sender) {
    const div = document.createElement('div');
    div.className = `msg ${type}`;
    if (sender && type === 'stranger') {
      div.innerHTML = `<div class="sender">${sender}</div>${text}`;
    } else {
      div.textContent = text;
    }
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  startBtn.addEventListener('click', () => {
    chatBox.innerHTML = '';
    socket.emit('find_partner', username);
    startBtn.textContent = '⏳ Searching...';
    startBtn.disabled = true;
  });

  socket.on('waiting', () => addMessage('⏳ Waiting for a stranger...', 'system'));
  socket.on('chat_start', ({ partner }) => {
    addMessage(`✅ Connected with ${partner}!`, 'system');
    msgInput.disabled = false;
    sendBtn.disabled = false;
    startBtn.textContent = '⏭ Next';
    startBtn.disabled = false;
  });
  socket.on('message', ({ text, from }) => addMessage(text, 'stranger', from));
  socket.on('partner_disconnected', () => {
    addMessage('❌ Stranger disconnected.', 'system');
    msgInput.disabled = true;
    sendBtn.disabled = true;
    startBtn.textContent = '🔍 Find a New Stranger';
  });

  sendBtn.addEventListener('click', sendMessage);
  msgInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

  function sendMessage() {
    const text = msgInput.value.trim();
    if (!text) return;
    socket.emit('message', text);
    addMessage(text, 'me');
    msgInput.value = '';
  }
</script>
</body>
</html>
